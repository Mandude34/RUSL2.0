kind = "web"
previewPath = "/"
title = "FlowStock"
version = "1.0.0"
id = "artifacts/flowstock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21169

[services.development]
run = "pnpm --filter @workspace/flowstock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flowstock", "run", "build" ]
publicDir = "artifacts/flowstock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21169"
BASE_PATH = "/"
